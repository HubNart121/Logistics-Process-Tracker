<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Tracker Pro - Managed Supply Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .process-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        @media (min-width: 768px) {
            .connector-line::before {
                content: '';
                position: absolute;
                left: 2rem;
                top: 5rem;
                bottom: -2rem;
                width: 2px;
                background: repeating-linear-gradient(to bottom, #e2e8f0 0, #e2e8f0 10px, transparent 10px, transparent 20px);
                z-index: 0;
            }
        }
        .process-card:last-child .connector-line::before { display: none; }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* PDF Styles - ปรับปรุงเพื่อแก้ปัญหาตัวหนังสือตกหล่น */
        .is-generating-pdf .no-print { display: none !important; }
        .is-generating-pdf .pdf-only { display: block !important; }
        .is-generating-pdf input, .is-generating-pdf select { border: none !important; background: transparent !important; appearance: none !important; padding: 0 !important; }
        
        .is-generating-pdf .process-card,
        .is-generating-pdf #summaryCard,
        .is-generating-pdf header { 
            page-break-inside: avoid !important; 
            break-inside: avoid !important;
            margin-bottom: 2rem !important;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <!-- Mobile Header -->
    <header class="md:hidden glass-effect sticky top-0 z-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center no-print">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="truck" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">LT Pro</span>
        </div>
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-xl">
            <i data-lucide="menu" class="w-7 h-7"></i>
        </button>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="no-print fixed inset-y-0 left-0 z-[60] w-72 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0 md:relative">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-200 text-white">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </div>
                <h2 class="text-lg font-extrabold text-slate-900 tracking-tight uppercase">LT Tracker</h2>
            </div>
            <button onclick="addProject()" class="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-colors" title="สร้างโปรเจกต์ใหม่">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div id="projectList" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
            <!-- Project items injected here -->
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">แอปพลิเคชันจัดการโลจิสติกส์</p>
                <p class="text-[10px] text-slate-300 font-medium">VERSION 2.1 (PDF Fix)</p>
            </div>
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 z-[55] hidden backdrop-blur-sm md:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 relative h-screen overflow-y-auto custom-scrollbar">
        <div id="main-content" class="max-w-5xl mx-auto p-4 sm:p-8 pb-24">
            
            <!-- Header Card -->
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-6 md:p-10 mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50/50 rounded-full -mr-32 -mt-32 blur-3xl no-print"></div>
                
                <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-8 relative z-10">
                    <div class="flex-1 space-y-5">
                        <div class="flex items-center gap-3 no-print">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold uppercase tracking-widest rounded-full border border-blue-100">Workspace</span>
                            <div class="flex gap-2">
                                <button onclick="downloadPDF()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400" title="พิมพ์รายงาน PDF">
                                    <i data-lucide="printer" class="w-5 h-5"></i>
                                </button>
                                <button onclick="shareProject()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400" title="แชร์ข้อความสถานะ">
                                    <i data-lucide="share-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <input type="text" id="projectName" oninput="updateProject('name', this.value)" 
                                   class="text-4xl font-black text-slate-900 bg-transparent border-none focus:outline-none w-full p-0 placeholder:text-slate-200" 
                                   placeholder="ชื่อโปรเจกต์...">
                            <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                                <div class="flex items-center gap-3 text-slate-500">
                                    <span class="text-sm font-bold text-slate-400 uppercase tracking-wider">Area:</span>
                                    <input type="text" id="projectArea" oninput="updateProject('area', this.value)" 
                                           class="text-lg font-semibold bg-transparent border-none focus:outline-none w-36 p-0" 
                                           placeholder="รหัสพื้นที่...">
                                </div>
                                <div class="w-px h-5 bg-slate-200 hidden sm:block"></div>
                                <div class="flex items-center gap-3 text-slate-500">
                                    <span class="text-sm font-bold text-slate-400 uppercase tracking-wider">Provider:</span>
                                    <input type="text" id="serviceProvider" oninput="updateProject('serviceProvider', this.value)" 
                                           class="text-lg font-semibold bg-transparent border-none focus:outline-none w-56 p-0" 
                                           placeholder="ชื่อผู้ให้บริการ...">
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-3 pt-2 no-print">
                            <div class="flex items-center gap-3 px-5 py-3 bg-slate-50 rounded-2xl border border-slate-100">
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Status:</span>
                                <select id="projectStatus" onchange="updateProject('status', this.value)" 
                                        class="bg-transparent text-slate-700 font-bold text-sm outline-none cursor-pointer">
                                    <option value="Kick off">Kick off</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Done">Done</option>
                                    <option value="Delayed">Delayed</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-600 px-10 py-8 rounded-[2rem] text-white flex flex-col items-center justify-center shadow-2xl shadow-blue-200 min-w-[180px]">
                        <p class="text-xs font-bold uppercase tracking-[0.2em] opacity-80 mb-2">เวลารวม</p>
                        <div class="flex items-baseline gap-1">
                            <span id="totalDaysHeader" class="text-6xl font-black">0</span>
                            <span class="text-lg font-bold opacity-80">วัน</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Process Container -->
            <div id="processContainer" class="space-y-8">
                <!-- Rows injected by JS -->
            </div>

            <!-- Add Button -->
            <button onclick="addProcess()" class="no-print w-full mt-12 py-10 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-slate-400 hover:text-blue-600 hover:border-blue-300 hover:bg-blue-50/50 transition-all flex flex-col items-center gap-3">
                <i data-lucide="plus-circle" class="w-12 h-12"></i>
                <span class="text-lg font-bold">เพิ่มขั้นตอนการทำงานใหม่</span>
            </button>

            <!-- Summary Card -->
            <div id="summaryCard" class="mt-16 bg-slate-900 rounded-[2.5rem] p-10 md:p-14 text-white shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-48 h-48 bg-blue-500/10 rounded-full -mr-24 -mt-24 blur-3xl"></div>
                <h3 class="text-2xl font-bold mb-12 flex items-center gap-4 relative z-10">
                    <i data-lucide="calendar-check" class="text-blue-400 w-8 h-8"></i>
                    ระยะเวลาโครงการรวม
                </h3>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-14 items-center relative z-10 text-center">
                    <div class="space-y-3">
                        <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">จุดเริ่มงาน</p>
                        <p id="summaryStart" class="text-4xl font-bold tracking-tight">--/--/----</p>
                        <p id="summaryOrigin" class="text-slate-400 text-base font-medium truncate px-4">ไม่ระบุต้นทาง</p>
                    </div>
                    
                    <div class="flex flex-col items-center justify-center">
                        <div class="text-xs text-slate-600 uppercase font-bold mb-4 tracking-widest">ระยะเวลาสุทธิ</div>
                        <div class="flex items-center w-full relative">
                            <div class="h-px bg-slate-800 flex-1"></div>
                            <div class="bg-blue-600 px-8 py-3.5 rounded-full text-2xl font-black mx-4 shadow-lg shadow-blue-600/20">
                                <span id="summaryTotalDays">0</span> วัน
                            </div>
                            <div class="h-px bg-slate-800 flex-1"></div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">จุดสิ้นสุด</p>
                        <p id="summaryEnd" class="text-4xl font-bold tracking-tight">--/--/----</p>
                        <p id="summaryDestination" class="text-slate-400 text-base font-medium truncate px-4">ไม่ระบุปลายทาง</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Confirm Dialog -->
    <div id="customDialog" class="fixed inset-0 z-[120] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h3 id="dialogTitle" class="text-2xl font-black mb-3 text-slate-900">ยืนยันการลบ?</h3>
            <p id="dialogMessage" class="text-slate-500 text-base mb-8 px-4">ข้อมูลจะถูกลบถาวร ไม่สามารถย้อนกลับได้</p>
            <div class="flex gap-4">
                <button id="dialogCancel" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 text-lg transition-colors">ยกเลิก</button>
                <button id="dialogConfirm" class="flex-1 py-4 bg-red-500 text-white font-bold rounded-2xl hover:bg-red-600 shadow-lg shadow-red-100 text-lg transition-colors">ยืนยันลบ</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let projects = JSON.parse(localStorage.getItem('lt_pro_simple_data')) || [
            {
                id: Date.now(),
                name: "นำเข้าสินค้าจาก Yiwu มา ไทย",
                area: "BKK-01",
                serviceProvider: "Lazada Express",
                status: "In Progress",
                processes: [
                    { id: 101, name: "ส่งสินค้าไปยังโกดัง Yiwu", origin: "Supplier A", destination: "โกดัง Yiwu", start: "2026-03-08", end: "2026-03-16" },
                    { id: 102, name: "ส่งสินค้าจากจีนมายังโกดังไทย", origin: "โกดัง Yiwu", destination: "โกดังไทย", start: "2026-03-18", end: "2026-03-27" }
                ]
            }
        ];
        let activeProjectId = projects[0].id;

        // Core Functions
        function save() {
            localStorage.setItem('lt_pro_simple_data', JSON.stringify(projects));
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            
            if (isHidden) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function calculateDays(start, end) {
            if (!start || !end) return 0;
            const s = new Date(start);
            const e = new Date(end);
            const diff = Math.ceil((e - s) / (1000 * 60 * 60 * 24));
            return diff >= 0 ? diff : 0;
        }

        function formatDateThai(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            if (isNaN(date)) return "-";
            return date.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Project Actions
        function addProject() {
            const newId = Date.now();
            projects.push({
                id: newId,
                name: "โปรเจกต์ใหม่",
                area: "",
                serviceProvider: "",
                status: "Kick off",
                processes: []
            });
            activeProjectId = newId;
            save();
            render();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function updateProject(field, value) {
            const project = projects.find(p => p.id === activeProjectId);
            if (project) {
                project[field] = value;
                save();
                if (field === 'name') renderSidebar();
            }
        }

        async function showConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customDialog');
                document.getElementById('dialogTitle').innerText = title;
                document.getElementById('dialogMessage').innerText = message;
                modal.classList.replace('hidden', 'flex');
                
                const onCancel = () => { modal.classList.replace('flex', 'hidden'); resolve(false); };
                const onConfirm = () => { modal.classList.replace('flex', 'hidden'); resolve(true); };
                
                document.getElementById('dialogCancel').onclick = onCancel;
                document.getElementById('dialogConfirm').onclick = onConfirm;
            });
        }

        async function deleteProject(id, event) {
            event.stopPropagation();
            if (projects.length === 1) return;
            const ok = await showConfirm("ลบโปรเจกต์?", "ข้อมูลทั้งหมดในโปรเจกต์นี้จะถูกลบถาวร");
            if (ok) {
                projects = projects.filter(p => p.id !== id);
                if (activeProjectId === id) activeProjectId = projects[0].id;
                save();
                render();
            }
        }

        // Process Actions
        function addProcess() {
            const project = projects.find(p => p.id === activeProjectId);
            const last = project.processes[project.processes.length - 1];
            project.processes.push({
                id: Date.now(),
                name: "",
                origin: last ? last.destination : "",
                destination: "",
                start: last ? last.end : "",
                end: ""
            });
            save();
            render();
        }

        function updateProcess(id, field, value) {
            const project = projects.find(p => p.id === activeProjectId);
            const proc = project.processes.find(p => p.id === id);
            if (proc) {
                proc[field] = value;
                save();
                
                if (field === 'start' || field === 'end') {
                    render();
                } else {
                    updateSummaryData();
                }
            }
        }

        async function removeProcess(id) {
            const ok = await showConfirm("ลบขั้นตอน?", "คุณต้องการลบขั้นตอนนี้ใช่หรือไม่?");
            if (ok) {
                const project = projects.find(p => p.id === activeProjectId);
                project.processes = project.processes.filter(p => p.id !== id);
                save();
                render();
            }
        }

        // Rendering
        function renderSidebar() {
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            projects.forEach(p => {
                const isActive = p.id === activeProjectId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-5 rounded-[1.25rem] cursor-pointer transition-all mb-3 ${isActive ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'hover:bg-slate-50 text-slate-500'}`;
                div.onclick = () => { activeProjectId = p.id; render(); if (window.innerWidth < 768) toggleSidebar(); };
                div.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <i data-lucide="file-text" class="w-5 h-5 shrink-0 opacity-70"></i>
                        <span class="text-base font-bold truncate">${p.name || 'Untitled'}</span>
                    </div>
                    <button onclick="deleteProject(${p.id}, event)" class="opacity-0 group-hover:opacity-100 p-2 hover:bg-white/20 rounded-lg transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function render() {
            renderSidebar();
            const project = projects.find(p => p.id === activeProjectId);
            
            // Header Info
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectArea').value = project.area;
            document.getElementById('serviceProvider').value = project.serviceProvider;
            document.getElementById('projectStatus').value = project.status;

            const container = document.getElementById('processContainer');
            container.innerHTML = '';

            project.processes.forEach((p, index) => {
                const days = calculateDays(p.start, p.end);

                const card = document.createElement('div');
                card.className = 'process-card relative group';
                card.innerHTML = `
                    <div class="connector-line no-print"></div>
                    <div class="relative z-10 bg-white rounded-[2.5rem] border border-slate-100 p-8 md:p-10 hover:shadow-2xl hover:shadow-slate-200/50 transition-all">
                        <div class="flex flex-col md:flex-row gap-10">
                            <div class="flex-1 space-y-7">
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        <p class="text-xs font-black text-blue-600 uppercase tracking-widest mb-2">Step 0${index + 1}</p>
                                        <input type="text" value="${p.name}" oninput="updateProcess(${p.id}, 'name', this.value)" 
                                               class="text-2xl font-bold bg-transparent border-none focus:outline-none w-full p-0 placeholder:text-slate-200" 
                                               placeholder="ชื่อขั้นตอนการทำงาน...">
                                    </div>
                                    <button onclick="removeProcess(${p.id})" class="no-print p-2.5 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div class="bg-slate-50 p-5 rounded-2xl flex items-center gap-5 border border-slate-100/50">
                                        <div class="bg-white p-3 rounded-xl text-slate-400 shadow-sm"><i data-lucide="arrow-up-right" class="w-5 h-5"></i></div>
                                        <div class="flex-1">
                                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">ต้นทาง</label>
                                            <input type="text" value="${p.origin}" oninput="updateProcess(${p.id}, 'origin', this.value)" class="w-full bg-transparent font-bold text-slate-700 outline-none text-base" placeholder="ระบุต้นทาง">
                                        </div>
                                    </div>
                                    <div class="bg-blue-50/50 p-5 rounded-2xl flex items-center gap-5 border border-blue-50">
                                        <div class="bg-blue-600 p-3 rounded-xl text-white shadow-lg shadow-blue-100"><i data-lucide="map-pin" class="w-5 h-5"></i></div>
                                        <div class="flex-1">
                                            <label class="text-xs font-bold text-blue-400 uppercase tracking-wider block mb-1">ปลายทาง</label>
                                            <input type="text" value="${p.destination}" oninput="updateProcess(${p.id}, 'destination', this.value)" class="w-full bg-transparent font-bold text-blue-700 outline-none text-base" placeholder="ระบุปลายทาง">
                                        </div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-6 pt-2">
                                    <div>
                                        <label class="text-xs font-bold text-slate-400 uppercase mb-3 block ml-2 tracking-wider">วันที่เริ่ม</label>
                                        <input type="date" value="${p.start}" onchange="updateProcess(${p.id}, 'start', this.value)" class="w-full bg-white border border-slate-100 p-4 rounded-xl font-bold text-slate-600 text-base outline-none focus:ring-4 ring-blue-50 transition-all">
                                    </div>
                                    <div>
                                        <label class="text-xs font-bold text-slate-400 uppercase mb-3 block ml-2 tracking-wider">วันที่สิ้นสุด</label>
                                        <input type="date" value="${p.end}" onchange="updateProcess(${p.id}, 'end', this.value)" class="w-full bg-white border border-slate-100 p-4 rounded-xl font-bold text-slate-600 text-base outline-none focus:ring-4 ring-blue-50 transition-all">
                                    </div>
                                </div>
                            </div>

                            <div class="md:w-48 flex flex-col items-center justify-center bg-blue-600 rounded-[2.5rem] p-8 text-white shadow-xl shadow-blue-100">
                                <p class="text-xs font-bold uppercase tracking-widest mb-2 opacity-70">ระยะเวลา</p>
                                <div class="text-5xl font-black mb-1">${days}</div>
                                <p class="text-xs font-bold uppercase opacity-70">วัน</p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            updateSummaryData();
            lucide.createIcons();
        }

        function updateSummaryData() {
            const project = projects.find(p => p.id === activeProjectId);
            let total = 0;
            let firstStart = null;
            let lastEnd = null;

            project.processes.forEach((p) => {
                if (p.start) {
                    const sd = new Date(p.start);
                    if (!firstStart || sd < firstStart) firstStart = sd;
                }
                if (p.end) {
                    const ed = new Date(p.end);
                    if (!lastEnd || ed > lastEnd) lastEnd = ed;
                }
            });

            const netDuration = (firstStart && lastEnd) ? calculateDays(firstStart, lastEnd) : 0;
            
            document.getElementById('totalDaysHeader').innerText = netDuration;
            document.getElementById('summaryTotalDays').innerText = netDuration;
            document.getElementById('summaryStart').innerText = formatDateThai(firstStart);
            document.getElementById('summaryEnd').innerText = formatDateThai(lastEnd);
            document.getElementById('summaryOrigin').innerText = project.processes.length > 0 ? (project.processes[0].origin || "ไม่ระบุ") : "ไม่ระบุ";
            document.getElementById('summaryDestination').innerText = project.processes.length > 0 ? (project.processes[project.processes.length - 1].destination || "ไม่ระบุ") : "ไม่ระบุ";
        }

        async function downloadPDF() {
            const project = projects.find(p => p.id === activeProjectId);
            document.body.classList.add('is-generating-pdf');
            
            // ปรับปรุงการตั้งค่า PDF Options เพื่อแก้ปัญหา Content ตกหล่น
            const opt = {
                margin: [10, 10, 10, 10], // top, left, bottom, right (mm)
                filename: `Logistics_${project.name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    letterRendering: true,
                    logging: false
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] } // บังคับให้ตรวจสอบ CSS page-break
            };

            try {
                // รอสักครู่เพื่อให้ CSS .is-generating-pdf ทำงานเต็มที่
                await new Promise(r => setTimeout(r, 300));
                const element = document.getElementById('main-content');
                await html2pdf().set(opt).from(element).save();
            } finally {
                document.body.classList.remove('is-generating-pdf');
            }
        }

        function shareProject() {
            const project = projects.find(p => p.id === activeProjectId);
            const total = document.getElementById('summaryTotalDays').innerText;
            const text = `โครงการ: ${project.name}\nพื้นที่: ${project.area}\nสถานะ: ${project.status}\nระยะเวลา: ${total} วัน\nสร้างโดย Logistic Tracker Pro`;
            
            if (navigator.share) {
                navigator.share({ title: project.name, text: text }).catch(() => {});
            } else {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("คัดลอกสรุปสถานะลงในคลิปบอร์ดแล้ว");
            }
        }

        window.onload = render;
    </script>
</body>
</html>
